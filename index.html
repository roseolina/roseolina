<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px 60px;
    font-family: 'Quicksand', sans-serif;
    position: relative;
    overflow-x: hidden;
    background: transparent;
  }

  .bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(255,182,217,0.55) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 10%, rgba(255,150,200,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 60%, rgba(230,120,175,0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 85%, rgba(255,200,230,0.45) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 90%, rgba(255,160,210,0.35) 0%, transparent 45%);
  }

  .petals-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    opacity: 0;
    animation: petalFall linear infinite;
    font-size: 18px;
    filter: drop-shadow(0 2px 4px rgba(200,80,130,0.3));
  }

  @keyframes petalFall {
    0%   { transform: translateY(-60px) rotate(0deg) translateX(0); opacity: 0; }
    5%   { opacity: 0.85; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(360deg) translateX(60px); opacity: 0; }
  }

  .sparkle {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,230,240,0.9);
    animation: sparkleTwinkle ease-in-out infinite;
  }

  @keyframes sparkleTwinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar-wrap {
    position: relative;
    margin-bottom: 18px;
    animation: floatAvatar 4s ease-in-out infinite;
  }

  @keyframes floatAvatar {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-9px); }
  }

  .avatar-ring {
    width: 112px; height: 112px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,160,210,0.7), rgba(220,100,160,0.8));
    box-shadow:
      0 0 0 6px rgba(255,255,255,0.25),
      0 8px 32px rgba(200,80,140,0.4),
      0 0 60px rgba(255,150,200,0.25);
  }

  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffcce8 0%, #f78abf 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    overflow: hidden;
  }

  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  .orbit-ring {
    position: absolute;
    top: -10px; left: -10px;
    width: 132px; height: 132px;
    border-radius: 50%;
    border: 1.5px dashed rgba(255,200,230,0.7);
    animation: orbit 8s linear infinite;
  }

  .orbit-dot {
    position: absolute;
    top: -5px; left: 50%;
    transform: translateX(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 8px rgba(255,150,200,0.8);
  }

  @keyframes orbit {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .name {
    font-family: 'Dancing Script', cursive;
    font-size: 36px;
    font-weight: 700;
    color: #6B1040;
    text-shadow: 0 2px 12px rgba(255,200,230,0.8), 0 0 30px rgba(255,180,220,0.5);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .bio {
    font-size: 13px;
    color: #6B1040;
    text-align: center;
    line-height: 1.7;
    margin-bottom: 30px;
    text-shadow: 0 1px 6px rgba(150,40,90,0.4);
    max-width: 340px;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 13px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #6B1040;
    text-transform: uppercase;
    margin-bottom: -2px;
    padding-left: 6px;
    align-self: flex-start;
  }

  .link-btn {
    width: 100%;
    padding: 15px 24px;
    border-radius: 50px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.45);
    color: #6B1040;
    font-family: 'Quicksand', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 4px 20px rgba(180,50,100,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
    letter-spacing: 0.3px;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -120%;
    width: 80%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: left 0.5s ease;
    transform: skewX(-15deg);
  }

  .link-btn:hover::before { left: 150%; }

  .link-btn:hover {
    transform: translateY(-4px) scale(1.025);
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.7);
    box-shadow: 0 10px 35px rgba(180,50,100,0.25), inset 0 1px 0 rgba(255,255,255,0.4);
  }

  .link-btn:active { transform: translateY(1px) scale(0.99); }

  .link-btn .icon {
    font-size: 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .link-btn .icon svg {
    width: 20px; height: 20px;
    fill: #6B1040;
  }

  .divider {
    width: 55%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    margin: 4px auto 4px;
  }

  .footer {
    margin-top: 38px;
    font-size: 12px;
    color: #6B1040;
    letter-spacing: 1.5px;
  }
</style>

<script>
  const petalSymbols = ['🌸','🌺','🌷','✿','❀','🌼'];
  const container = document.getElementById('petals');

  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalSymbols[Math.floor(Math.random() * petalSymbols.length)];
    p.style.left = (Math.random() * 100) + '%';
    p.style.fontSize = (Math.random() * 14 + 12) + 'px';
    p.style.animationDuration = (Math.random() * 10 + 10) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    container.appendChild(p);
  }

  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*5+3}px;height:${Math.random()*5+3}px;animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*5}s;position:fixed;`;
    container.appendChild(s);
  }
</script>
